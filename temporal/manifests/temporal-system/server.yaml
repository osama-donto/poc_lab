---
apiVersion: v1
kind: Namespace
metadata:
  name: temporal-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-server
  namespace: temporal-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal-server
  template:
    metadata:
      labels:
        app: temporal-server
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - until pg_isready -h postgres.temporal-system.svc.cluster.local -U temporal; do sleep 2; done
      containers:
        - name: temporal
          image: temporalio/auto-setup:latest
          env:
            - name: DB
              value: postgres12
            - name: POSTGRES_USER
              value: temporal
            - name: POSTGRES_PWD
              value: temporal
            - name: DB_PORT
              value: "5432"
            - name: POSTGRES_SEEDS
              value: postgres.temporal-system.svc.cluster.local
            - name: DBNAME
              value: temporal
            - name: VISIBILITY_DBNAME
              value: temporal_visibility
          ports:
            - containerPort: 7233
          resources:
            requests:
              memory: 512Mi
              cpu: 200m
            limits:
              memory: 1Gi
              cpu: 500m
---
apiVersion: v1
kind: Service
metadata:
  name: temporal-frontend
  namespace: temporal-system
spec:
  selector:
    app: temporal-server
  ports:
    - port: 7233
      targetPort: 7233

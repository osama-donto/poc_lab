---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-service
  namespace: temporal-workers
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-service
  template:
    metadata:
      labels:
        app: api-service
    spec:
      containers:
        - name: api
          image: python-temporal-api:local
          imagePullPolicy: Never
          command: ["uvicorn", "api_service:app", "--host", "0.0.0.0", "--port", "8000"]
          env:
            # Replace with your key, or use a Secret ref for production
            - name: OPENAI_API_KEY
              value: "REPLACE_WITH_YOUR_KEY"
          ports:
            - containerPort: 8000
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: temporal-workers
spec:
  selector:
    app: api-service
  ports:
    - port: 8000
      targetPort: 8000

services:

  # ============================================================
  #  LITELLM PROXY
  #  Lean gateway layer: one API endpoint backed by Postgres
  #  for state and Redis for cache.
  #
  #  UI dashboard: http://localhost:4000/ui
  #  API endpoint: http://localhost:4000
  #  Health check:  http://localhost:4000/health
  # ============================================================
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: litellm-proxy
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    ports:
      - "4000:4000"

    # ── Volumes ───────────────────────────────────────────────
    volumes:
      # Config file (read-only — edits are hot-reloaded)
      - ./litellm-config.yaml:/app/config.yaml:ro
      # Persistent logs directory on host
      - litellm-logs:/app/logs

    # ── Environment variables ─────────────────────────────────
    environment:
      # ── Master / Salt keys ───────────────────────────────────
      # Master key: admin key for the proxy UI and API management.
      # Must start with sk-  Can be rotated after setup.
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}

      # Salt key: used to encrypt/decrypt stored provider API keys
      # in the database. SET ONCE — never change after first run
      # or all stored encrypted keys will become unreadable.
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY}

      # ── Database (PostgreSQL) ────────────────────────────────
      # Stores virtual keys, spend tracking, request logs, teams.
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      STORE_MODEL_IN_DB: "True"

      # ── Redis (response caching) ─────────────────────────────
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      # ── Optional additional provider keys ────────────────────
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}

      # ── Proxy behaviour ──────────────────────────────────────
      # Number of async workers (raise for high concurrency)
      LITELLM_NUM_WORKERS: "12"
      # Log verbosity: DEBUG | INFO | WARNING | ERROR
      LITELLM_LOG: "INFO"
      # Drop unknown params instead of erroring (cross-provider compat)
      LITELLM_DROP_PARAMS: "True"
      # Timezone for spend / log timestamps
      TZ: ${TZ:-Europe/Berlin}

    command: >
      --config /app/config.yaml
      --port 4000
      --num_workers 8

    # Reach local services on the host (Ollama, LM Studio, etc.)
    extra_hosts:
      - "host.docker.internal:host-gateway"

    # ── Internet access ───────────────────────────────────────
    # Explicit DNS ensures LiteLLM can resolve external API
    # endpoints (api.anthropic.com, generativelanguage.googleapis.com,
    # api.openai.com, etc.) regardless of host DNS quirks.
    dns:
      - 1.1.1.1   # Cloudflare — primary
      - 8.8.8.8   # Google     — fallback

    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

    networks:
      - litellm-net

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"


  # ============================================================
  #  POSTGRESQL
  #  Persistent storage for: virtual API keys, spend logs,
  #  user/team records, model configs, request history.
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: litellm-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ:-Europe/Berlin}

    volumes:
      # Named volume — survives container restarts and recreates
      - postgres-data:/var/lib/postgresql/data

    # Expose only to localhost (not accessible externally)
    ports:
      - "127.0.0.1:5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    networks:
      - litellm-net

    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"


  # ============================================================
  #  REDIS
  #  In-memory response caching for a small, fast local stack.
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: litellm-redis
    restart: unless-stopped

    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no

    volumes:
      - redis-data:/data

    # Exposed to localhost so Redis desktop clients can connect directly
    ports:
      - "127.0.0.1:6379:6379"

    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

    networks:
      - litellm-net

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"


# ============================================================
#  NAMED VOLUMES
#  Data persists across `docker compose down` and `up`.
#  Only `docker compose down -v` removes them.
# ============================================================
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  litellm-logs:
    driver: local


# ============================================================
#  NETWORK
#  Isolated bridge network — services talk by service name.
# ============================================================
networks:
  litellm-net:
    driver: bridge
    internal: false   # Explicit: outbound internet access allowed (required by LiteLLM)
